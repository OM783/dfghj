<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IPL Auction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .auth-card {
            max-width: 400px;
            margin: 5rem auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 2rem;
            color: var(--accent);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .auth-form input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }

        .btn-auth {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background: white;
            transform: scale(1.02);
        }

        .auth-link {
            margin-top: 1.5rem;
            display: block;
            opacity: 0.7;
            font-size: 0.9rem;
            text-decoration: none;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>IPL AUCTION <span class="highlight">2026</span></h1>
        </header>

        <div class="auth-card">
            <h2>User Login</h2>
            <form class="auth-form" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-auth">LOGIN</button>
            </form>
            <a href="/register" class="auth-link">Don't have an account? Register here</a>
            <a href="/" class="auth-link">← Back to Home</a>
        </div>
    </div>
</body>

</html>
